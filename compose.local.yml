services:
  db:
    ports:
      - "5432:5432"

  backend:
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    command: fastapi dev src/main.py --host 0.0.0.0 --reload

  worker:
    env_file:
      - .env.local
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    command: taskiq worker src.workers.settings:broker

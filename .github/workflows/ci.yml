name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: cd backend && uv sync

      - name: Lint
        run: cd backend && uv run ruff check .

      - name: Test
        run: cd backend && uv run pytest -x -q --cov=src --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://app:app@localhost:5432/app
          TEST_DATABASE_URL: postgresql+asyncpg://app:app@localhost:5432/app_test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker compose -f compose.yml build backend
